<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bate-papo Web App</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#00A884" />
</head>
<body>
  <div id="app">
    <section id="authScreen" class="screen center-screen">
      <div class="auth-card">
        <div class="logo-circle">💬</div>
        <h1>Bate-papo</h1>
        <p>Converse, envie fotos, áudio e status.</p>

        <input id="authName" placeholder="Seu nome" autocomplete="name" />
        <input id="authEmail" type="email" placeholder="Email" autocomplete="email" />
        <input id="authPassword" type="password" placeholder="Senha" autocomplete="current-password" />

        <button id="btnRegister">Criar conta</button>
        <button id="btnLogin" class="secondary">Entrar</button>
        <small id="debugText"></small>
      </div>
    </section>

    <section id="homeScreen" class="screen hidden">
      <header class="topbar">
        <div>
          <h2>Bate-papo</h2>
          <small>online</small>
        </div>
        <div class="top-actions">
          <button id="btnProfile">👤</button>
          <button id="btnLogout">Sair</button>
        </div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="chats">Conversas</button>
        <button class="tab" data-tab="status">Status</button>
        <button class="tab" data-tab="users">Contatos</button>
      </nav>

      <main>
        <div id="tabChats" class="tab-page">
          <div id="chatList" class="list"></div>
        </div>

        <div id="tabStatus" class="tab-page hidden">
          <div class="composer-card">
            <textarea id="statusText" placeholder="Digite seu status..."></textarea>
            <div class="row">
              <input id="statusImage" type="file" accept="image/*" />
              <button id="btnPostStatus">Publicar</button>
            </div>
          </div>
          <div id="statusList" class="list"></div>
        </div>

        <div id="tabUsers" class="tab-page hidden">
          <div class="search-card">
            <input id="searchEmail" placeholder="Buscar por email do contato" />
            <button id="btnSearchUser">Buscar</button>
          </div>
          <div id="userList" class="list"></div>
        </div>
      </main>
    </section>

    <section id="chatScreen" class="screen hidden">
      <header class="chat-header">
        <button id="btnBack">←</button>
        <div class="avatar" id="chatAvatar">👤</div>
        <div class="chat-title">
          <strong id="chatName">Contato</strong>
          <small id="chatOnline">offline</small>
        </div>
      </header>

      <div id="messagesList" class="messages"></div>

      <footer class="message-box">
        <button id="btnPickImage">📎</button>
        <input id="imageInput" class="hidden" type="file" accept="image/*" />
        <textarea id="messageText" placeholder="Mensagem"></textarea>
        <button id="btnRecord">🎙️</button>
        <button id="btnSend">➤</button>
      </footer>
    </section>

    <section id="profileScreen" class="screen hidden">
      <header class="chat-header">
        <button id="btnBackProfile">←</button>
        <strong>Meu perfil</strong>
      </header>
      <div class="profile-card">
        <div class="big-avatar" id="profilePhotoPreview">👤</div>
        <input id="profilePhoto" type="file" accept="image/*" />
        <input id="profileName" placeholder="Nome" />
        <input id="profileBio" placeholder="Recado" />
        <button id="btnSaveProfile">Salvar perfil</button>
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="app.js?v=300"></script>
</body>
</html>
